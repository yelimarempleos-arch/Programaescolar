<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar</title>
    

<div class="container my-4">
    <!-- HEADER -->
    <header class="text-center py-4 mb-4 bg-light rounded shadow-sm">
        <h1 class="display-5 fw-bold text-primary">U.E.E. VICENTE WALLIS</h1>
        <p class="lead">Sistema de Registro de Alumnos</p>
    </header>

    <!-- CARDS  -->
    <section class="row g-3 mb-5 text-center">
        <div class="col-md-4">
            <div class="card border-0 bg-primary text-white shadow">
                <div class="card-body">
                    <h6>Inscritos</h6>
                    <h2 id="contador" class="display-6 fw-bold">3</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 bg-warning shadow">
                <div class="card-body">
                    <h6>Pendientes</h6>
                    <h2 class="display-6 fw-bold">1</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 bg-success text-white shadow">
                <div class="card-body">
                    <h6>Cupos Disponibles</h6>
                    <h2 class="display-6 fw-bold">45</h2>
                </div>
            </div>
        </div>
    </section>

    <div class="row g-4">
      <!--  fragmento FORMULARIO -->
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h4 class="text-center">Nuevo Alumno</h4>
                <hr>
                <form id="formulario">
                    <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre" required>
                    <input type="text" id="apellido" class="form-control mb-2" placeholder="Apellido" required>
                    <input type="text" id="cedula" class="form-control mb-2" placeholder="Cédula" required>
                    <input type="number" id="edad" class="form-control mb-2" placeholder="Edad" required>
                    <select id="grado" class="form-select mb-3">
                        <option value="1ro">1er Grado</option>
                        <option value="2do">2do Grado</option>
                        <option value="3ro">3er Grado</option>
                    </select>
                    <button type="submit" class="btn btn-dark w-100">Guardar</button>
                </form>
            </div>
        </div>
