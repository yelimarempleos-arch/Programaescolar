<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar</title>
    <link rel="icon" href="img1.jpg">
    <!-- Enlace a CSS de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .margen-superior { margin-top: 30px; }
    </style>
</head>
<body>

    <div class="container margen-superior">
        <header>
            <h1 class="text-center mb-4" style="background-color: #d1f7ee;">Registro U.E.E. VICENTE WALLIS </h1>
        </header>

    <!-- Tarjetas Cards -->
    <section class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white p-3">
                <h5>Inscritos</h5>
                <h3>3</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning p-3">
                <h5>Pendientes</h5>
                <h3>2</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white p-3">
                <h5>Cupos</h5>
                <h3>45</h3>
            </div>
        </div>
    </section> 
    
    </div>

        <!-- aporte diego form -->
        <aside class="col-md-4">
            <div class="card p-3 shadow">
                <h4 class="text-center">Nuevo ingreso </h4>
                <hr>
                <form id="formulario">
                    <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre" required>
                    <input type="text" id="apellido" class="form-control mb-2" placeholder="Apellido" required>
                    <input type="text" id="cedula" class="form-control mb-2" placeholder="Cédula" required>
                    <input type="number" id="edad" class="form-control mb-2" placeholder="Edad" required>
                    <select id="grado" class="form-select mb-3">
                        <option value="1ro">1er Grado</option>
                        <option value="2do">2do Grado</option>
                        <option value="3ro">3er Grado</option>
                    </select>
                    <button type="submit" class="btn btn-dark w-100">Guardar</button>
                </form>
            </div>
        </aside>


 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
